<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メール送信メニュー</title>

<style>
  body {
    font-family: sans-serif;
    padding: 16px;
    background: #f5f5f5;
  }

  h2 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
  }

  button {
    display: block;
    width: 100%;
    padding: 22px;
    margin: 12px 0;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    color: white;
  }

  /* 色分け */
  .blue { background: #0078d4; }
  .green { background: #28a745; }
  .orange { background: #f39c12; }
  .red { background: #d9534f; }

  button:active {
    opacity: 0.8;
  }
</style>

<script>
function sendMail(to, cc, subject, body) {
  if (!confirm("メールを起動しますか？")) return;

  let url = "mailto:" + to;

  let params = [];
  if (cc) params.push("cc=" + encodeURIComponent(cc));
  if (subject) params.push("subject=" + encodeURIComponent(subject));
  if (body) params.push("body=" + encodeURIComponent(body));

  if (params.length > 0) {
    url += "?" + params.join("&");
  }

  location.href = url;
}
</script>

</head>
<body>

<h2>メール送信メニュー</h2>

onclick="sendMail(
